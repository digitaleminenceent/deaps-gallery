<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DEAPS AI Photography Studio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="assets/css/style.css">

</head>
<body>

<nav class="navbar navbar-dark bg-black border-bottom border-secondary">

<div class="container d-flex justify-content-between align-items-center">

<a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="#">

<img src="assets/logo.png" alt="DEAPS" style="height:40px;">

<span>Digital Eminence AI Photography Studio</span>

</a>

<div id="authArea">
  <button class="btn btn-outline-warning btn-sm" data-bs-toggle="modal" data-bs-target="#loginModal">
    Login
  </button>
  <button class="btn btn-warning btn-sm" data-bs-toggle="modal" data-bs-target="#signupModal">
    Sign Up
  </button>
</div>

</div>

</nav>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Login</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="loginEmail" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="loginPassword" class="form-control" required>
          </div>
          <div id="loginError" class="text-danger small mb-2"></div>
          <button type="submit" class="btn btn-warning w-100">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Sign Up Modal -->
<div class="modal fade" id="signupModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Sign Up</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="signupForm">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="signupEmail" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="signupPassword" class="form-control" required minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">No. Telefon</label>
            <input type="tel" id="signupPhone" class="form-control">
          </div>
          <div class="form-check mb-3">
            <input type="checkbox" id="marketingConsent" class="form-check-input">
            <label class="form-check-label small" for="marketingConsent">
              Saya bersetuju terima promosi melalui email/SMS
            </label>
          </div>
          <div id="signupError" class="text-danger small mb-2"></div>
          <button type="submit" class="btn btn-warning w-100">Sign Up</button>
        </form>
      </div>
    </div>
  </div>
</div>

<section class="hero-section">

<div class="container text-center">

<div class="logo-circle" style="background:none; width:200px; height:200px;">

<img src="assets/logo.png" alt="DEAPS" style="width:100%; height:100%; object-fit:contain;">

</div>

<h1 class="hero-title">

DEAPS

</h1>

<h3 class="hero-subtitle">

Digital Eminence AI Photography Studio

</h3>

<p class="hero-description">

Browse AI Photography Categories

</p>

<div class="search-box">

<input
type="text"
class="form-control"
placeholder="Search Style Code">

<button
class="btn btn-warning">

<i class="bi bi-search"></i>

</button>

</div>

</div>

</section>

<section class="container py-5">

<div class="section-title">

<h2>

Browse Categories

</h2>

<p>

Select a category to explore all available styles.

</p>

</div>

<div class="row g-4" id="categoryGrid">

<p class="text-secondary text-center w-100">Loading categories...</p>

</div>

</div>

</section>

<footer>

<div class="container text-center">

<hr>

<p>

© 2026 Digital Eminence AI Photography Studio

</p>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/core/constants.js"></script>
<script src="supabase-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/auth.js"></script>
<script src="data/config.js"></script>
<script src="assets/js/app.js"></script>

</body>

</html>
