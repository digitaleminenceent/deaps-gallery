<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Dashboard — DEAPS Admin</title>
<meta name="robots" content="noindex, nofollow">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>
  body {
    background: #0d0d0d;
    color: #eee;
    font-family: 'Segoe UI', sans-serif;
  }
  .stat-card {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
  }
  .stat-card h3 {
    color: #D4AF37;
    font-size: 1.8rem;
    margin-bottom: 4px;
  }
  .stat-card p {
    color: #999;
    margin: 0;
    font-size: 0.85rem;
  }
  .panel {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 20px;
  }
  .panel h5 {
    color: #D4AF37;
    margin-bottom: 16px;
  }
  table {
    color: #eee;
  }
  .table > :not(caption) > * > * {
    background: transparent;
    color: #eee;
    border-color: #2a2a2a;
  }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .bar-track {
    flex-grow: 1;
    background: #2a2a2a;
    border-radius: 4px;
    height: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: #D4AF37;
  }
  .skeleton-shimmer {
    background: linear-gradient(90deg, #1a1a1a 25%, #2a2a2a 50%, #1a1a1a 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>

<nav class="navbar navbar-dark px-4" style="background:#111; border-bottom:1px solid #2a2a2a;">
  <a class="navbar-brand text-warning fw-bold" href="index.html">DEAPS Admin</a>
  <div id="authArea"></div>
</nav>

<div class="container-fluid py-4 px-4">

  <h2 class="mb-4">Analytics Dashboard</h2>

  <div class="row g-3 mb-4" id="statCardsRow">
    <div class="col-md-3">
      <div class="stat-card">
        <div class="skeleton-shimmer" style="height:28px; width:60%; margin-bottom:8px;"></div>
        <div class="skeleton-shimmer" style="height:14px; width:80%;"></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="stat-card">
        <div class="skeleton-shimmer" style="height:28px; width:60%; margin-bottom:8px;"></div>
        <div class="skeleton-shimmer" style="height:14px; width:80%;"></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="stat-card">
        <div class="skeleton-shimmer" style="height:28px; width:60%; margin-bottom:8px;"></div>
        <div class="skeleton-shimmer" style="height:14px; width:80%;"></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="stat-card">
        <div class="skeleton-shimmer" style="height:28px; width:60%; margin-bottom:8px;"></div>
        <div class="skeleton-shimmer" style="height:14px; width:80%;"></div>
      </div>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-lg-6">
      <div class="panel">
        <h5><i class="bi bi-star-fill"></i> Platform Rating Distribution</h5>
        <div id="platformRatingDist"><div class="skeleton-shimmer" style="height:120px;"></div></div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="panel">
        <h5><i class="bi bi-tags-fill"></i> Category Performance</h5>
        <div id="categoryPerformance"><div class="skeleton-shimmer" style="height:120px;"></div></div>
      </div>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-lg-6">
      <div class="panel">
        <h5><i class="bi bi-heart-fill"></i> Most Bookmarked Styles</h5>
        <div id="mostBookmarked"><div class="skeleton-shimmer" style="height:180px;"></div></div>
      </div>
    </div>
    <div class="col-lg-6">
      <div class="panel">
        <h5><i class="bi bi-trophy-fill"></i> Top Rated Styles</h5>
        <div id="topRated"><div class="skeleton-shimmer" style="height:180px;"></div></div>
      </div>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-12">
      <div class="panel">
        <h5><i class="bi bi-graph-up"></i> Ratings Submitted (Last 14 Days)</h5>
        <div id="ratingsTrend"><div class="skeleton-shimmer" style="height:100px;"></div></div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="data/config.js"></script>
<script src="assets/js/admin-analytics.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
