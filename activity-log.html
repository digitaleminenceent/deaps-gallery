<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Activity Log — DEAPS Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .al-timeline { position:relative; padding-left:28px; }
  .al-timeline::before { content:""; position:absolute; left:9px; top:0; bottom:0; width:2px; background:#2a2a2a; }
  .al-entry { position:relative; margin-bottom:18px; }
  .al-dot { position:absolute; left:-28px; top:4px; width:18px; height:18px; border-radius:50%; background:#141414; border:2px solid #D4AF37; display:flex; align-items:center; justify-content:center; font-size:.6rem; color:#D4AF37; }
  .al-card { background:#141414; border:1px solid #2a2a2a; border-radius:10px; padding:12px 16px; }
</style>
</head>
<body class="admin-page-body admin-glow text-white">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
      <img src="assets/logo.png" alt="DEAPS" style="height:36px;">
      <span>Activity Log</span>
    </a>
    <div class="d-flex align-items-center gap-2">
      <a href="gallery-management.html" class="btn btn-outline-warning btn-sm"><i class="bi bi-arrow-left"></i> Back to Gallery Management</a>
      <div id="authArea"></div>
    </div>
  </div>
</nav>

<div class="container py-4">

  <h2 class="gold-heading mb-4"><i class="bi bi-clock-history"></i> Activity Log</h2>

  <div class="row g-2 mb-4">
    <div class="col-md-3">
      <select id="alEntityFilter" class="form-select">
        <option value="">All Types</option>
        <option value="image">Gallery Item</option>
        <option value="category">Category</option>
        <option value="subcategory">Subcategory</option>
      </select>
    </div>
    <div class="col-md-3">
      <select id="alActionFilter" class="form-select">
        <option value="">All Actions</option>
        <option value="create">Create</option>
        <option value="update">Update</option>
        <option value="duplicate">Duplicate</option>
        <option value="archive">Archive</option>
        <option value="restore">Restore</option>
        <option value="delete">Delete</option>
        <option value="permanent_delete">Permanent Delete</option>
        <option value="bulk_publish">Bulk Publish</option>
        <option value="bulk_archive">Bulk Archive</option>
        <option value="bulk_delete">Bulk Delete</option>
      </select>
    </div>
    <div class="col-md-3">
      <input type="date" id="alDateFrom" class="form-control" title="From date">
    </div>
    <div class="col-md-3">
      <input type="date" id="alDateTo" class="form-control" title="To date">
    </div>
  </div>

  <p class="text-secondary small mb-3" id="alResultCount">Loading...</p>

  <div id="alTimelineContainer" class="al-timeline"></div>

  <div class="text-center mt-4" id="alLoadMoreWrap" style="display:none;">
    <button class="btn btn-outline-warning" id="alLoadMoreBtn">Load More</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/activity-log.js"></script>

</body>
</html>
