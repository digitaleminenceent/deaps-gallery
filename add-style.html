<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEAPS Admin - Add Style</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

<style>

body{
background:#111827;
color:white;
}

.navbar{
background:#000;
}

.card{
background:#1f2937;
border:1px solid #444;
border-radius:15px;
}

.form-control,
.form-select,
textarea{

background:#111827;
color:white;
border:1px solid #555;

}

.form-control:focus,
.form-select:focus,
textarea:focus{

background:#111827;
color:white;

}

.preview{

height:420px;

border:2px dashed #555;

border-radius:15px;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}

.preview img{

max-width:100%;

max-height:100%;

display:none;

}

#placeholder{

color:#888;

font-size:20px;

}

</style>

</head>

<body>

<nav class="navbar navbar-dark">

<div class="container">

<a
href="admin.html"
class="navbar-brand fw-bold">

← Dashboard

</a>

<span class="text-warning">

DEAPS Add Style

</span>

</div>

</nav>

<div class="container py-5">

<div class="row g-4">

<div class="col-lg-5">

<div class="card p-3">

<div class="preview">

<img
id="previewImage">

<div
id="placeholder">

Preview Image

</div>

</div>

<input

type="file"

class="form-control mt-3"

id="imageInput"

accept="image/*">

</div>

</div>

<div class="col-lg-7">

<div class="card p-4">

<h3 class="mb-4">

New Style

</h3>

<div class="mb-3">

<label>

Style Code

</label>

<input

id="styleCode"

class="form-control"

placeholder="FP-0001">

</div>

<div class="mb-3">

<label>

Title

</label>

<input

id="title"

class="form-control"

placeholder="Luxury Editorial">

</div>

<div class="mb-3">

<label>

Category

</label>

<select

id="category"

class="form-select">

<option value="female">Female Portrait</option>

<option value="male">Male Portrait</option>

<option value="fashion">Fashion</option>

<option value="beauty">Beauty</option>

<option value="sports">Sports</option>

<option value="travel">Travel</option>

<option value="fantasy">Fantasy</option>

<option value="product">Product</option>

<option value="automotive">Automotive</option>

<option value="food">Food</option>

<option value="interior">Interior</option>

<option value="advertising">Advertising</option>

</select>

</div>

<div class="mb-3">

<label>

Tags

</label>

<input

id="tags"

class="form-control"

placeholder="Luxury, Studio, Portrait">

</div>

<div class="mb-3">

<label>

Prompt

</label>

<textarea

id="prompt"

rows="8"

class="form-control"

placeholder="Paste your full AI Prompt here..."></textarea>

<div class="row">

<div class="col">

<div class="form-check">

<input

id="featured"

type="checkbox"

class="form-check-input">

<label
class="form-check-label">

Featured Style

</label>

</div>

</div>

<div class="col">

<div class="form-check">

<input

id="newest"

type="checkbox"

class="form-check-input">

<label
class="form-check-label">

New Arrival

</label>

</div>

</div>

</div>

<hr>

<div class="d-grid gap-2">

<button

id="saveBtn"

class="btn btn-warning btn-lg">

<i class="bi bi-cloud-upload-fill"></i>

Save Style

</button>

<a

href="admin.html"

class="btn btn-outline-light">

Cancel

</a>

</div>

</div>

</div>

</div>

</div>

<script type="module" src="assets/js/firebase.js"></script>

<script type="module" src="assets/js/add-style.js"></script>

<script>

const imageInput=document.getElementById("imageInput");

const preview=document.getElementById("previewImage");

const placeholder=document.getElementById("placeholder");

imageInput.addEventListener("change",()=>{

const file=imageInput.files[0];

if(!file)return;

preview.src=URL.createObjectURL(file);

preview.style.display="block";

placeholder.style.display="none";

});

</script>

</body>

</html>
