<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gallery Management — DEAPS Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .gm-stat-card { background:#141414; border:1px solid #2a2a2a; border-radius:10px; padding:18px; }
  .gm-stat-card h3 { color:#D4AF37; font-size:1.8rem; margin:0; }
  .gm-stat-card p { color:#999; margin:0; font-size:.85rem; }
  .gm-item-card { background:#141414; border:1px solid #2a2a2a; border-radius:10px; overflow:hidden; height:100%; }
  .gm-item-card img { width:100%; aspect-ratio:4/5; object-fit:cover; }
  .gm-item-compact img { aspect-ratio:1/1; }
  .gm-badge-status { font-size:.7rem; }
  table.gm-table th { color:#D4AF37; border-color:#2a2a2a; }
  table.gm-table td { border-color:#2a2a2a; vertical-align:middle; }
  table.gm-table img { width:50px; height:60px; object-fit:cover; border-radius:6px; }
</style>
</head>
<body class="admin-page-body admin-glow text-white">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
      <img src="assets/logo.png" alt="DEAPS" style="height:36px;">
      <span>Gallery Management</span>
    </a>
    <div class="d-flex align-items-center gap-2">
      <a href="admin.html" class="btn btn-outline-warning btn-sm"><i class="bi bi-cloud-upload"></i> Upload</a>
      <a href="category-management.html" class="btn btn-outline-warning btn-sm"><i class="bi bi-tags"></i> Categories</a>
      <a href="recycle-bin.html" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash3"></i> Recycle Bin</a>
      <a href="activity-log.html" class="btn btn-outline-warning btn-sm"><i class="bi bi-clock-history"></i> Activity Log</a>
      <a href="admin-analytics.html" class="btn btn-outline-warning btn-sm"><i class="bi bi-graph-up"></i> Analytics</a>
      <div id="authArea"></div>
    </div>
  </div>
</nav>

<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer" style="z-index:1080;"></div>

<div class="container py-4">

  <!-- STAT CARDS -->
  <div class="row g-3 mb-4">
    <div class="col-md-2-4 col-6 col-md">
      <div class="gm-stat-card"><h3 id="statTotal">–</h3><p>Total Galleries</p></div>
    </div>
    <div class="col-6 col-md">
      <div class="gm-stat-card"><h3 id="statDraft">–</h3><p>Draft</p></div>
    </div>
    <div class="col-6 col-md">
      <div class="gm-stat-card"><h3 id="statPublished">–</h3><p>Published</p></div>
    </div>
    <div class="col-6 col-md">
      <div class="gm-stat-card"><h3 id="statFeatured">–</h3><p>Featured</p></div>
    </div>
    <div class="col-6 col-md">
      <div class="gm-stat-card"><h3 id="statArchived">–</h3><p>Archived</p></div>
    </div>
  </div>

  <!-- RECENT ACTIVITY WIDGET -->
  <div class="mb-4">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h6 class="text-secondary mb-0"><i class="bi bi-clock-history"></i> Recent Activity</h6>
      <a href="activity-log.html" class="small text-warning">View all →</a>
    </div>
    <div id="gmRecentActivity" class="gm-stat-card" style="padding:12px 16px;">
      <p class="text-secondary small mb-0">Loading...</p>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
    <input type="text" id="gmSearch" class="form-control" style="max-width:240px;" placeholder="Search title, slug, tags...">
    <select id="gmCategoryFilter" class="form-select" style="max-width:180px;"><option value="">All Categories</option></select>
    <select id="gmStatusFilter" class="form-select" style="max-width:150px;">
      <option value="">All Status</option>
      <option value="draft">Draft</option>
      <option value="published">Published</option>
      <option value="archived">Archived</option>
    </select>
    <select id="gmFeaturedFilter" class="form-select" style="max-width:150px;">
      <option value="">All Items</option>
      <option value="true">Featured Only</option>
    </select>
    <select id="gmRecentFilter" class="form-select" style="max-width:170px;">
      <option value="">Any Time</option>
      <option value="7">Recently Added (7 days)</option>
      <option value="30">Recently Added (30 days)</option>
    </select>
    <select id="gmSort" class="form-select" style="max-width:170px;">
      <option value="latest">Latest</option>
      <option value="oldest">Oldest</option>
      <option value="az">Alphabetical A–Z</option>
      <option value="updated">Recently Updated</option>
      <option value="display_order">Display Order</option>
    </select>
    <div class="btn-group ms-auto" role="group">
      <button class="btn btn-outline-light btn-sm active" id="gmViewCard" aria-label="Card view"><i class="bi bi-grid"></i></button>
      <button class="btn btn-outline-light btn-sm" id="gmViewCompact" aria-label="Compact card view"><i class="bi bi-grid-3x3"></i></button>
      <button class="btn btn-outline-light btn-sm" id="gmViewTable" aria-label="Table view"><i class="bi bi-list-ul"></i></button>
    </div>
  </div>

  <!-- BULK ACTION TOOLBAR -->
  <div id="gmBulkToolbar" class="d-flex flex-wrap align-items-center gap-2 mb-3 p-2 rounded" style="background:#1a1a1a; border:1px solid #2a2a2a; display:none;">
    <span class="text-warning small" id="gmSelectedCount">0 selected</span>
    <button class="btn btn-outline-success btn-sm" onclick="gmBulkAction('publish')"><i class="bi bi-check-circle"></i> Publish</button>
    <button class="btn btn-outline-secondary btn-sm" onclick="gmBulkAction('unpublish')"><i class="bi bi-x-circle"></i> Unpublish</button>
    <button class="btn btn-outline-warning btn-sm" onclick="gmBulkAction('archive')"><i class="bi bi-archive"></i> Archive</button>
    <button class="btn btn-outline-info btn-sm" onclick="gmBulkAction('restore')"><i class="bi bi-arrow-counterclockwise"></i> Restore</button>
    <button class="btn btn-outline-light btn-sm" onclick="gmBulkAction('feature')"><i class="bi bi-star-fill"></i> Mark Featured</button>
    <button class="btn btn-outline-light btn-sm" onclick="gmBulkAction('unfeature')"><i class="bi bi-star"></i> Remove Featured</button>
    <button class="btn btn-outline-info btn-sm" onclick="gmBulkAction('duplicate')"><i class="bi bi-files"></i> Duplicate</button>
    <select id="gmBulkCategorySelect" class="form-select form-select-sm" style="max-width:160px; display:none;"></select>
    <button class="btn btn-outline-primary btn-sm" id="gmBulkMoveCategoryBtn" onclick="gmBulkMoveCategory()" style="display:none;">Move</button>
    <button class="btn btn-outline-primary btn-sm" onclick="gmShowMoveCategoryUI()"><i class="bi bi-folder-symlink"></i> Move Category</button>
    <button class="btn btn-outline-danger btn-sm" onclick="gmBulkAction('delete')"><i class="bi bi-trash"></i> Delete</button>
    <button class="btn btn-outline-light btn-sm ms-auto" onclick="gmClearSelection()">Clear</button>
  </div>

  <div class="d-flex align-items-center gap-2 mb-2">
    <input type="checkbox" id="gmSelectAll" class="form-check-input">
    <label for="gmSelectAll" class="small text-secondary mb-0">Select all on this page</label>
  </div>

  <div class="progress mb-3" id="gmProgressWrap" style="display:none; height:20px; background:#1a1a1a;">
    <div class="progress-bar bg-warning" id="gmProgressBar" style="width:0%;">0%</div>
  </div>

  <p class="text-secondary small mb-3" id="gmResultCount">Loading...</p>

  <div id="gmListContainer"></div>

  <div class="text-center mt-4" id="gmLoadMoreWrap" style="display:none;">
    <button class="btn btn-outline-warning" id="gmLoadMoreBtn">Load More</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<!-- VERSION HISTORY MODAL -->
<div class="modal fade" id="gvHistoryModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="gvModalTitle">Version History</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="gvVersionList"></div>
        <div id="gvCompareArea"></div>
      </div>
    </div>
  </div>
</div>

<!-- VERSION RESTORE PREVIEW MODAL -->
<div class="modal fade" id="gvPreviewModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="gvPreviewTitle">Confirm Restore</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="gvPreviewBody"></div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-warning" id="gvPreviewConfirmBtn">Confirm</button>
      </div>
    </div>
  </div>
</div>

<script src="assets/js/gallery-management.js"></script>
<script src="assets/js/gallery-versions.js"></script>

</body>
</html>
