<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Style</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body class="bg-dark text-white">

<nav class="navbar navbar-dark bg-black">

<div class="container">

<a
href="manage-styles.html"
class="navbar-brand">

← Back

</a>

<h4>

Edit Style

</h4>

</div>

</nav>

<div class="container py-5">

<div class="row">

<div class="col-lg-5">

<div class="card bg-black border-secondary">

<div class="card-body">

<img

id="preview"

class="img-fluid rounded"

style="width:100%;height:420px;object-fit:cover;">

</div>

</div>

</div>

<div class="col-lg-7">

<div class="card bg-black border-secondary">

<div class="card-body">

<div class="mb-3">

<label>

Style Code

</label>

<input

id="styleCode"

class="form-control">

</div>

<div class="mb-3">

<label>

Title

</label>

<input

id="title"

class="form-control">

</div>

<div class="mb-3">

<label>

Category

</label>

<input

id="category"

class="form-control">

</div>

<div class="mb-3">

<label>

Tags

</label>

<input

id="tags"

class="form-control">

</div>

<div class="mb-3">

<label>

Prompt

</label>

<textarea

id="prompt"

rows="8"

class="form-control">

</textarea>

</div>

<div class="row">

<div class="col">

<div class="form-check">

<input

id="featured"

type="checkbox"

class="form-check-input">

<label>

Featured

</label>

</div>

</div>

<div class="col">

<div class="form-check">

<input

id="newest"

type="checkbox"

class="form-check-input">

<label>

Newest

</label>

</div>

</div>

</div>

<hr>

<button

id="saveBtn"

class="btn btn-warning w-100">

Save Changes

</button>

</div>

</div>

</div>

</div>

</div>

<script type="module"

src="assets/js/edit-style.js">

</script>

</body>

</html>
