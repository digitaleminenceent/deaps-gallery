<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title id="pageTitle">DEAPS Gallery</title>
<meta name="description" id="pageDescription" content="Browse premium AI-generated photography styles at DEAPS Gallery.">
<link rel="canonical" id="canonicalLink" href="https://deaps.example.com/gallery.html">

<meta property="og:title" id="ogTitle" content="DEAPS Gallery">
<meta property="og:description" id="ogDescription" content="Browse premium AI-generated photography styles.">
<meta property="og:type" content="website">
<meta property="og:image" id="ogImage" content="">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" id="twitterTitle" content="DEAPS Gallery">
<meta name="twitter:description" id="twitterDescription" content="Browse premium AI-generated photography styles.">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/gallery-browser.css">

</head>
<body>

<nav class="navbar navbar-dark bg-black border-bottom border-secondary">
<div class="container d-flex justify-content-between align-items-center">
<a href="index.html" class="navbar-brand fw-bold d-flex align-items-center gap-2">
<img src="assets/logo.png" alt="DEAPS" style="height:36px;">
<span>Digital Eminence AI Photography Studio</span>
</a>
<div class="d-flex align-items-center gap-2">
<div id="authArea"></div>
<a href="index.html" class="btn btn-outline-light btn-sm">
<i class="bi bi-arrow-left"></i> Back
</a>
</div>
</div>
</nav>

<div class="container py-4">

  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb" id="breadcrumbNav"></ol>
  </nav>

  <div class="row mb-3 align-items-center g-3">
    <div class="col-lg-4">
      <h2 id="categoryTitle" class="mb-0">Gallery</h2>
      <p class="text-secondary small mb-0" id="resultCount"></p>
    </div>
    <div class="col-lg-8">
      <div class="d-flex flex-wrap gap-2 justify-content-lg-end">
        <div class="position-relative" style="min-width:220px; flex:1;">
          <i class="bi bi-search position-absolute" style="left:12px; top:50%; transform:translateY(-50%); color:#888;"></i>
          <input id="gallerySearch" class="form-control ps-4" placeholder="Search style name, category..." aria-label="Search styles">
        </div>
        <select id="categoryFilter" class="form-select" style="max-width:170px;" aria-label="Filter by category">
          <option value="">All Categories</option>
        </select>
        <select id="sortSelect" class="form-select" style="max-width:190px;" aria-label="Sort styles">
          <option value="latest">Latest</option>
          <option value="oldest">Oldest</option>
          <option value="az">A–Z</option>
          <option value="za">Z–A</option>
          <option value="rating">Highest Rated</option>
          <option value="most_rated">Most Rated</option>
          <option value="random">Random</option>
        </select>
        <select id="ratingFilter" class="form-select" style="max-width:150px;" aria-label="Filter by rating">
          <option value="">Any Rating</option>
          <option value="4">4★ & up</option>
          <option value="3">3★ & up</option>
          <option value="2">2★ & up</option>
          <option value="1">1★ & up</option>
        </select>
        <div class="btn-group" role="group" aria-label="View mode">
          <button type="button" class="btn btn-outline-light" id="viewGridBtn" title="Standard Grid" aria-label="Standard grid view"><i class="bi bi-grid-3x3-gap"></i></button>
          <button type="button" class="btn btn-outline-light" id="viewLargeBtn" title="Large Grid" aria-label="Large grid view"><i class="bi bi-grid"></i></button>
          <button type="button" class="btn btn-outline-light" id="viewCompactBtn" title="Compact Grid" aria-label="Compact grid view"><i class="bi bi-grid-3x2"></i></button>
        </div>
      </div>
    </div>
  </div>

  <div id="subcategoryNav"></div>

  <div id="activeFilterChips" class="d-flex flex-wrap gap-2 mb-3"></div>

  <div id="galleryContainer" class="row g-4"></div>

  <div id="loadMoreWrap" class="text-center mt-4" style="display:none;">
    <button id="loadMoreBtn" class="btn btn-outline-warning">Load More</button>
  </div>

</div>

<!-- STYLE DETAIL MODAL -->
<div class="modal fade" id="styleModal" tabindex="-1" aria-hidden="true">
<div class="modal-dialog modal-xl modal-dialog-centered">
<div class="modal-content bg-dark border border-secondary">
<div class="modal-body">

<button class="btn-close btn-close-white float-end" data-bs-dismiss="modal" aria-label="Close"></button>

<div class="row">
<div class="col-lg-6">
<img id="modalImage" class="img-fluid rounded" alt="">
</div>
<div class="col-lg-6">

<div class="d-flex gap-2 mb-2" id="modalBadges"></div>

<h2 id="modalCode" class="text-warning mt-1"></h2>
<h4 id="modalTitle"></h4>

<div class="d-flex align-items-center gap-2 mb-3">
  <div id="modalRatingStars" class="fs-5" role="img" aria-label="Average rating"></div>
  <span class="text-secondary small" id="modalRatingSummary"></span>
</div>

<div id="modalTags" class="my-3"></div>

<div class="border border-secondary rounded p-3 mb-3">
  <p class="small mb-2 text-secondary">Rate this style</p>
  <div id="starSelector" class="fs-3 mb-2" role="group" aria-label="Select star rating">
    <i class="bi bi-star star-input" data-value="1"></i>
    <i class="bi bi-star star-input" data-value="2"></i>
    <i class="bi bi-star star-input" data-value="3"></i>
    <i class="bi bi-star star-input" data-value="4"></i>
    <i class="bi bi-star star-input" data-value="5"></i>
  </div>
  <button id="submitRatingBtn" class="btn btn-sm btn-warning" disabled>Submit Rating</button>
  <div id="ratingMsg" class="small mt-2"></div>
</div>

<button id="bookBtn" class="btn btn-warning w-100 mb-3">
<i class="bi bi-whatsapp"></i> Book This Style
</button>

<div class="d-flex gap-2 mb-3">
<button id="favoriteBtn" class="btn btn-outline-light w-50">
<i class="bi bi-heart"></i> Bookmark
</button>
<button id="cartBtn" class="btn btn-outline-light w-50">
<i class="bi bi-cart"></i> Add to Cart
</button>
</div>

<button id="shareBtn" class="btn btn-outline-secondary w-100 mb-3">
<i class="bi bi-share"></i> Share Style
</button>

<div id="actionMsg" class="small mb-3"></div>

</div>
</div>

</div>
</div>
</div>
</div>

<!-- SHARE MODAL -->
<div class="modal fade" id="shareModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark border border-secondary">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Share this Style</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="d-flex flex-wrap gap-2 justify-content-center" id="shareOptions"></div>
        <div class="input-group mt-3">
          <input type="text" class="form-control" id="shareUrlInput" readonly>
          <button class="btn btn-warning" id="copyLinkBtn">Copy Link</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="data/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/url-state-manager.js"></script>
<script src="assets/js/gallery.js"></script>

</body>

</html>
