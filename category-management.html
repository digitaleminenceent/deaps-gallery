<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DEAPS Admin — Category Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="assets/css/style.css">

</head>
<body class="admin-page-body admin-glow text-white">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
      <img src="assets/logo.png" alt="DEAPS" style="height:36px;">
      <span>Category Management</span>
    </a>
    <div class="d-flex align-items-center gap-2">
      <a href="admin.html" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left"></i> Back to Admin</a>
      <div id="authArea"></div>
    </div>
  </div>
</nav>

<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer" style="z-index: 1080;"></div>

<div class="container py-5">

  <div id="notAdmin" class="text-center" style="display:none;">
    <p class="text-danger">Access Denied. Akaun ini bukan admin.</p>
    <a href="index.html" class="btn btn-warning">Homepage</a>
  </div>

  <div id="catManagerContent" style="display:none;">

    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
      <h2 class="gold-heading mb-0">Categories</h2>
      <button class="btn btn-warning" id="addCategoryBtn"><i class="bi bi-plus-lg"></i> Add Category</button>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-md-4">
        <input type="text" id="catSearch" class="form-control admin-input" placeholder="Search name / description...">
      </div>
      <div class="col-md-2">
        <select id="catFilter" class="form-select admin-input">
          <option value="all">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="archived">Archived</option>
        </select>
      </div>
      <div class="col-md-2">
        <select id="catHomeFilter" class="form-select admin-input">
          <option value="all">Show on Home: All</option>
          <option value="yes">Show on Home only</option>
          <option value="no">Hidden only</option>
        </select>
      </div>
      <div class="col-md-2">
        <select id="catSubFilter" class="form-select admin-input">
          <option value="all">Subcategories: All</option>
          <option value="yes">Has Subcategories</option>
          <option value="no">No Subcategories</option>
        </select>
      </div>
      <div class="col-md-2">
        <select id="catSort" class="form-select admin-input">
          <option value="order">Sort: Display Order</option>
          <option value="name">Sort: Name (A-Z)</option>
          <option value="updated">Sort: Last Updated</option>
        </select>
      </div>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="catRecentFilter">
      <label class="form-check-label small text-secondary" for="catRecentFilter">Recently updated only (last 7 days)</label>
    </div>

    <!-- BULK ACTION TOOLBAR -->
    <div id="bulkToolbar" class="d-flex flex-wrap align-items-center gap-2 mb-3 p-2 border border-secondary rounded" style="display:none !important;">
      <span class="small text-secondary" id="bulkCount">0 selected</span>
      <button class="btn btn-sm btn-outline-success" onclick="bulkAction('activate')">Activate</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="bulkAction('deactivate')">Deactivate</button>
      <button class="btn btn-sm btn-outline-warning" onclick="bulkAction('archive')">Archive</button>
      <button class="btn btn-sm btn-outline-info" onclick="bulkAction('duplicate')">Duplicate</button>
      <button class="btn btn-sm btn-outline-danger" onclick="bulkAction('delete')">Delete</button>
      <button class="btn btn-sm btn-link text-secondary" onclick="clearSelection()">Clear selection</button>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this.checked)">
      <label class="form-check-label small text-secondary" for="selectAllCheckbox">Select all visible</label>
    </div>

    <div id="loadingIndicator" class="text-center py-4" style="display:none;">
      <div class="spinner-border text-warning"></div>
    </div>

    <div id="categoryList" class="d-flex flex-column gap-3"></div>

  </div>

</div>

<!-- CATEGORY ADD/EDIT MODAL -->
<div class="modal fade" id="categoryModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="categoryModalTitle">Add Category</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="categoryForm">
          <input type="hidden" id="catId" value="">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Category Name</label>
              <input type="text" id="catName" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Slug</label>
              <input type="text" id="catSlug" class="form-control" required>
            </div>

            <div class="col-md-4">
              <label class="form-label">Icon</label>
              <div class="d-flex gap-2 align-items-center">
                <span id="catIconPreview" class="border border-secondary rounded d-flex align-items-center justify-content-center" style="width:44px; height:44px; font-size:1.3rem;"><i class="bi bi-folder"></i></span>
                <input type="text" id="catIcon" class="form-control" placeholder="bi-camera" readonly style="cursor:pointer;" onclick="openIconPicker('catIcon','catIconPreview')">
              </div>
            </div>
            <div class="col-md-4">
              <label class="form-label">Color</label>
              <input type="color" id="catColor" class="form-control form-control-color" value="#D4AF37">
            </div>
            <div class="col-md-4">
              <label class="form-label">Style Code Prefix</label>
              <input type="text" id="catPrefix" class="form-control" placeholder="FP" maxlength="4">
            </div>

            <div class="col-md-6">
              <label class="form-label">Banner / Thumbnail <span class="text-secondary small">(optional)</span></label>
              <input type="file" id="catBanner" class="form-control" accept="image/*">
              <img id="catBannerPreview" src="" alt="" style="display:none; max-height:100px; margin-top:8px; border-radius:8px;">
            </div>
            <div class="col-md-6">
              <label class="form-label">Display Order</label>
              <input type="number" id="catOrder" class="form-control" value="0">
            </div>

            <div class="col-12">
              <label class="form-label">Description <span class="text-secondary small">(optional)</span></label>
              <textarea id="catDescription" class="form-control" rows="2"></textarea>
            </div>

            <div class="col-md-6">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="catActive" checked>
                <label class="form-check-label" for="catActive">Active</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="catShowHome" checked>
                <label class="form-check-label" for="catShowHome">Show on Home</label>
              </div>
            </div>
          </div>

          <div id="categoryFormError" class="text-danger small mt-3"></div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-warning" id="saveCategoryBtn">Save Category</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- SUBCATEGORY ADD/EDIT MODAL -->
<div class="modal fade" id="subcategoryModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title" id="subcategoryModalTitle">Add Subcategory — <span id="subcatCategoryName"></span></h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="subcategoryForm">
          <input type="hidden" id="subcatId" value="">
          <input type="hidden" id="subcatCategoryId" value="">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Subcategory Name</label>
              <input type="text" id="subcatName" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Slug</label>
              <input type="text" id="subcatSlug" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Icon</label>
              <div class="d-flex gap-2 align-items-center">
                <span id="subcatIconPreview" class="border border-secondary rounded d-flex align-items-center justify-content-center" style="width:44px; height:44px; font-size:1.3rem;"><i class="bi bi-tag"></i></span>
                <input type="text" id="subcatIcon" class="form-control" placeholder="bi-tag" readonly style="cursor:pointer;" onclick="openIconPicker('subcatIcon','subcatIconPreview')">
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Color</label>
              <input type="color" id="subcatColor" class="form-control form-control-color" value="#D4AF37">
            </div>
            <div class="col-12">
              <label class="form-label">Description <span class="text-secondary small">(optional)</span></label>
              <textarea id="subcatDescription" class="form-control" rows="2"></textarea>
            </div>
            <div class="col-md-6">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="subcatActive" checked>
                <label class="form-check-label" for="subcatActive">Active</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="subcatShowHome" checked>
                <label class="form-check-label" for="subcatShowHome">Show on Home</label>
              </div>
            </div>
          </div>

          <div id="subcatFormError" class="text-danger small mt-3"></div>

          <div class="d-flex justify-content-end gap-2 mt-4">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-warning" id="saveSubcatBtn">Save Subcategory</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- ICON PICKER MODAL -->
<div class="modal fade" id="iconPickerModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Choose Icon</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="text" id="iconSearchInput" class="form-control mb-3" placeholder="Search icon (e.g. camera, heart, star)...">
        <div id="iconGrid" class="d-flex flex-wrap gap-2" style="max-height:320px; overflow-y:auto;"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/category-management.js"></script>

</body>

</html>
