<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEAPS Gallery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-black border-bottom border-secondary">

<div class="container d-flex justify-content-between align-items-center">

<a href="index.html" class="navbar-brand fw-bold d-flex align-items-center gap-2">

<img src="assets/logo.png" alt="DEAPS" style="height:36px;">

<span>Digital Eminence AI Photography Studio</span>

</a>

<div class="d-flex align-items-center gap-2">

<div id="authArea"></div>

<a href="index.html" class="btn btn-outline-light btn-sm">

<i class="bi bi-arrow-left"></i>

Back

</a>

</div>

</div>

</nav>

<div class="container py-5">

<div class="row mb-4">

<div class="col-lg-6">

<h2
id="categoryTitle">

Gallery

</h2>

</div>

<div class="col-lg-6">

<input

id="gallerySearch"

class="form-control"

placeholder="Search Style Code...">

</div>

</div>

<div

class="row g-4"

id="galleryContainer">

</div>

</div>

<!-- Modal -->

<div

class="modal fade"

id="styleModal"

tabindex="-1">

<div

class="modal-dialog modal-xl modal-dialog-centered">

<div

class="modal-content bg-dark border border-secondary">

<div class="modal-body">

<button

class="btn-close btn-close-white float-end"

data-bs-dismiss="modal">

</button>

<div class="row">

<div class="col-lg-6">

<img

id="modalImage"

class="img-fluid rounded">

</div>

<div class="col-lg-6">

<h2

id="modalCode"

class="text-warning mt-3">

</h2>

<h4

id="modalTitle">

</h4>

<div

id="modalTags"

class="my-4">

</div>

<button

id="bookBtn"

class="btn btn-warning w-100 mb-3">

<i class="bi bi-whatsapp"></i>

Book This Style

</button>

<div class="d-flex gap-2 mb-3">

<button

id="favoriteBtn"

class="btn btn-outline-light w-50">

<i class="bi bi-heart"></i>

Favorite

</button>

<button

id="cartBtn"

class="btn btn-outline-light w-50">

<i class="bi bi-cart"></i>

Add to Cart

</button>

</div>

<div id="actionMsg" class="small mb-3"></div>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="data/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/gallery.js"></script>

</body>

</html>
