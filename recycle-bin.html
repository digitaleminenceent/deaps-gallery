<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recycle Bin — DEAPS Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .rb-item-card { background:#141414; border:1px solid #2a2a2a; border-radius:10px; overflow:hidden; height:100%; }
  .rb-item-card img { width:100%; aspect-ratio:4/5; object-fit:cover; opacity:.6; }
  .rb-badge-days { font-size:.7rem; }
</style>
</head>
<body class="admin-page-body admin-glow text-white">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
      <img src="assets/logo.png" alt="DEAPS" style="height:36px;">
      <span>Recycle Bin</span>
    </a>
    <div class="d-flex align-items-center gap-2">
      <a href="gallery-management.html" class="btn btn-outline-warning btn-sm"><i class="bi bi-arrow-left"></i> Back to Gallery Management</a>
      <div id="authArea"></div>
    </div>
  </div>
</nav>

<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer" style="z-index:1080;"></div>

<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="gold-heading mb-0"><i class="bi bi-trash3"></i> Recycle Bin</h2>
  </div>

  <p class="text-secondary small mb-4">
    Item di sini telah dipadam dari Gallery Management tetapi belum dipadam kekal.
    Anda boleh <strong>Restore</strong> untuk pulihkan (status asal dikekalkan), atau <strong>Delete Permanently</strong> untuk padam kekal (termasuk fail gambar).
  </p>

  <div class="row g-2 mb-3">
    <div class="col-md-4">
      <input type="text" id="rbSearch" class="form-control" placeholder="Search title / slug...">
    </div>
    <div class="col-md-3">
      <select id="rbCategoryFilter" class="form-select">
        <option value="">All Categories</option>
      </select>
    </div>
    <div class="col-md-3">
      <select id="rbSort" class="form-select">
        <option value="deleted_desc">Sort: Recently Deleted</option>
        <option value="deleted_asc">Sort: Oldest Deleted</option>
        <option value="title">Sort: Title (A-Z)</option>
      </select>
    </div>
  </div>

  <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
    <input type="checkbox" id="rbSelectAll" class="form-check-input">
    <label for="rbSelectAll" class="small text-secondary mb-0 me-3">Select all</label>
    <span class="small text-secondary" id="rbSelectedCount">0 selected</span>
    <button class="btn btn-outline-success btn-sm" onclick="rbBulkRestore()"><i class="bi bi-arrow-counterclockwise"></i> Restore Selected</button>
    <button class="btn btn-outline-danger btn-sm" onclick="rbBulkDelete()"><i class="bi bi-trash3"></i> Delete Permanently</button>
  </div>

  <p class="text-secondary small mb-3" id="rbResultCount">Loading...</p>

  <div id="rbListContainer"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/recycle-bin.js"></script>

</body>
</html>
