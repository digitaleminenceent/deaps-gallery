<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>DEAPS Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="assets/css/style.css">

</head>
<body class="bg-dark text-white">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary">
  <div class="container d-flex justify-content-between align-items-center">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="index.html">
      <img src="assets/logo.png" alt="DEAPS" style="height:36px;">
      <span>Digital Eminence AI Photography Studio Admin</span>
    </a>
    <div id="authArea"></div>
  </div>
</nav>

<!-- TOAST NOTIFICATIONS -->
<div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer" style="z-index: 1080;"></div>

<div class="container py-5">

  <!-- LOGIN CARD -->
  <div id="loginCard" class="mx-auto" style="max-width: 400px; display:none;">
    <div class="card bg-secondary bg-opacity-25 border-secondary">
      <div class="card-body">
        <h5 class="card-title mb-3">Admin Login</h5>
        <form id="adminLoginForm">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="adminEmail" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="adminPassword" class="form-control" required>
          </div>
          <div id="adminLoginError" class="text-danger small mb-2"></div>
          <button type="submit" class="btn btn-warning w-100">Login</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ACCESS DENIED -->
  <div id="deniedCard" class="mx-auto text-center" style="max-width: 400px; display:none;">
    <p class="text-danger">Access Denied. Akaun ini bukan admin.</p>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" style="display:none;">

    <h2 class="mb-4" id="formHeading">Tambah Gambar Katalog</h2>

    <form id="imageForm" class="mb-5">
      <input type="hidden" id="editingId" value="">
      <div class="row g-4">

        <!-- LEFT: IMAGE PREVIEW / UPLOAD -->
        <div class="col-md-5">
          <label for="imgFile" class="d-block" style="cursor:pointer;">
            <div id="imgDropArea" class="d-flex align-items-center justify-content-center border border-secondary rounded" style="height:400px; background:#111; overflow:hidden;">
              <img id="imgPreview" src="" alt="" style="display:none; max-height:100%; max-width:100%; object-fit:contain;">
              <div id="imgPlaceholder" class="text-center text-secondary">
                <i class="bi bi-image" style="font-size:3rem;"></i>
                <p class="mt-2 mb-0">Klik untuk pilih gambar</p>
              </div>
            </div>
          </label>
          <input type="file" id="imgFile" class="d-none" accept="image/*">
          <p class="small text-secondary mt-2 mb-0" id="imgChangeHint" style="display:none;">
            <i class="bi bi-info-circle"></i> Klik gambar di atas untuk tukar gambar. Jika tiada gambar baru dipilih, gambar sedia ada akan dikekalkan.
          </p>
        </div>

        <!-- RIGHT: DETAILS -->
        <div class="col-md-7">
          <div class="mb-3">
            <label class="form-label">Title</label>
            <input type="text" id="imgTitle" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <select id="imgCategory" class="form-select" required>
              <option value="female">Female Portrait</option>
              <option value="male">Male Portrait</option>
              <option value="fashion">Fashion</option>
              <option value="beauty">Beauty</option>
              <option value="sports">Sports</option>
              <option value="travel">Travel</option>
              <option value="fantasy">Fantasy</option>
              <option value="product">Product</option>
              <option value="automotive">Automotive</option>
              <option value="food">Food</option>
              <option value="interior">Interior</option>
              <option value="advertising">Advertising</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Description <span class="text-secondary small">(dipaparkan kepada customer)</span></label>
            <textarea id="imgDescription" class="form-control" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">AI Prompt <span class="text-warning small">(rujukan admin sahaja, tidak dipaparkan kepada customer)</span></label>
            <textarea id="imgAdminPrompt" class="form-control" rows="3" placeholder="Contoh: portrait of a woman, studio lighting, 85mm lens..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Price (RM)</label>
            <input type="number" id="imgPrice" class="form-control" step="0.01" value="0">
          </div>
          <div id="imageFormError" class="text-danger small mb-2"></div>
          <div class="d-flex flex-wrap gap-2">
            <button type="submit" class="btn btn-warning" id="uploadBtn">Upload & Tambah</button>
            <button type="button" class="btn btn-outline-info" id="duplicateBtn" style="display:none;">
              <i class="bi bi-files"></i> Duplicate
            </button>
            <button type="button" class="btn btn-outline-secondary" id="cancelEditBtn" style="display:none;">
              <i class="bi bi-x-circle"></i> Cancel Edit
            </button>
          </div>
        </div>

      </div>
    </form>

    <hr class="border-secondary">

    <h2 class="mb-4">Senarai Katalog</h2>
    <div id="catalogList" class="row g-3"></div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/admin.js"></script>

</body>

</html>
